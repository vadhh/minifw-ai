name: minifw-government
# USB variant — uses pre-loaded images, no source build required.
# Images must be loaded first: docker load -i images/minifw-government.tar
# Start via: demo.sh (USB root) — do not run directly.

volumes:
  minifw_government_logs:

services:

  # -- Firewall Engine -----------------------------------------------------
  engine:
    image: minifw-ai-demo/government:latest
    container_name: minifw_government_engine
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - minifw_government_logs:/opt/minifw_ai/logs
      - ./config/modes:/opt/minifw_ai/config/modes:ro
      - ./config/feeds:/opt/minifw_ai/config/feeds:ro
      - ./yara_rules:/opt/minifw_ai/yara_rules:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-engine.sh"]
    environment:
      PRODUCT_MODE: minifw_government
      MINIFW_SECTOR: government
      MINIFW_SECRET_KEY: "demo-government-key-change-in-prod!!"
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_government/policy.json
      MINIFW_FEEDS: /opt/minifw_ai/config/feeds
      MINIFW_LOG: /opt/minifw_ai/logs/events.jsonl
      MINIFW_FLOW_RECORDS: /opt/minifw_ai/logs/flow_records.jsonl
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_MLP_MODEL: /opt/minifw_ai/models/mlp_model.pkl
      MINIFW_YARA_RULES: /opt/minifw_ai/yara_rules
      MINIFW_DNS_SOURCE: file
      AI_ENABLED: "1"
      MINIFW_DISABLE_FLOWS: "1"
    healthcheck:
      test: ["CMD", "test", "-f", "/opt/minifw_ai/logs/audit.jsonl"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # -- Web Dashboard -------------------------------------------------------
  web:
    image: minifw-ai-demo/government:latest
    container_name: minifw_government_web
    depends_on:
      engine:
        condition: service_healthy
    volumes:
      - minifw_government_logs:/opt/minifw_ai/logs
      - ./config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-web.sh"]
    environment:
      PRODUCT_MODE: minifw_government
      MINIFW_SECRET_KEY: "demo-government-key-change-in-prod!!"
      MINIFW_ADMIN_PASSWORD: "Government1!"
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_LOG: /opt/minifw_ai/logs/events.jsonl
      MINIFW_SECTOR: government
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_government/policy.json
      MINIFW_EXTERNAL_PORT: "8449"
      PYTHONPATH: /opt/minifw_ai/app
      DEMO_MODE: attack_simulation
    ports:
      - "8449:8443"
    restart: unless-stopped

  # -- Demo Traffic Injector -----------------------------------------------
  injector:
    image: minifw-ai-demo/government-injector:latest
    container_name: minifw_government_injector
    depends_on:
      engine:
        condition: service_healthy
    volumes:
      - minifw_government_logs:/logs
    environment:
      DNS_LOG_PATH: /logs/dnsmasq.log
    restart: unless-stopped
