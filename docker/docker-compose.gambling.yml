name: minifw-gambling
# PRODUCT_MODE: minifw_gambling — regulatory gambling enforcement (GAMBLING_ONLY=1)
# Start: docker compose -f docker/docker-compose.gambling.yml up

volumes:
  minifw_gambling_logs:

services:

  # ── Firewall Engine ─────────────────────────────────────────────────────────
  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: minifw_gambling_engine
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - minifw_gambling_logs:/opt/minifw_ai/logs
      - ../config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-engine.sh"]
    environment:
      PRODUCT_MODE: minifw_gambling
      MINIFW_SECTOR: establishment
      MINIFW_SECRET_KEY: "demo-gambling-key-change-in-prod!!"
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_gambling/policy.json
      MINIFW_FEEDS: /opt/minifw_ai/config/feeds
      MINIFW_LOG: /opt/minifw_ai/logs/events.jsonl
      MINIFW_FLOW_RECORDS: /opt/minifw_ai/logs/flow_records.jsonl
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_MLP_MODEL: /opt/minifw_ai/models/mlp_model.pkl
      MINIFW_YARA_RULES: /opt/minifw_ai/yara_rules
      MINIFW_DNS_SOURCE: file
      AI_ENABLED: "1"
      GAMBLING_ONLY: "1"
      ALLOWED_DETECTION_TYPES: "gambling"
      MINIFW_DISABLE_FLOWS: "1"
    healthcheck:
      test: ["CMD", "test", "-f", "/opt/minifw_ai/logs/audit.jsonl"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ── Web Dashboard ────────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: minifw_gambling_web
    depends_on:
      engine:
        condition: service_healthy
    volumes:
      - minifw_gambling_logs:/opt/minifw_ai/logs
      - ../config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-web.sh"]
    environment:
      PRODUCT_MODE: minifw_gambling
      MINIFW_SECRET_KEY: "demo-gambling-key-change-in-prod!!"
      MINIFW_ADMIN_PASSWORD: "Gambling1!"
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_SECTOR: establishment
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_gambling/policy.json
      GAMBLING_ONLY: "1"
      MINIFW_EXTERNAL_PORT: "8445"
      PYTHONPATH: /opt/minifw_ai/app
      DEMO_MODE: attack_simulation
    ports:
      - "8445:8443"
    restart: unless-stopped

  # ── Demo Traffic Injector ────────────────────────────────────────────────────
  injector:
    build:
      context: demo-injector-gambling/
    container_name: minifw_gambling_injector
    depends_on:
      engine:
        condition: service_healthy
    volumes:
      - minifw_gambling_logs:/logs
    environment:
      DNS_LOG_PATH: /logs/dnsmasq.log
    restart: unless-stopped
