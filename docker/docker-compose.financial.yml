name: minifw-financial
# PRODUCT_MODE: minifw_financial — finance / PCI-DSS / Tor blocking
# Start: docker compose -f docker/docker-compose.financial.yml up

volumes:
  minifw_financial_logs:   # engine writes events.jsonl + audit.jsonl; web reads; injector writes dnsmasq.log

services:

  # ── Firewall Engine ─────────────────────────────────────────────────────────
  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: minifw-financial-engine
    container_name: minifw_financial_engine
    cap_add:
      - NET_ADMIN
      - NET_RAW
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - minifw_financial_logs:/opt/minifw_ai/logs
      - ../config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-engine.sh"]
    environment:
      PRODUCT_MODE: minifw_financial
      MINIFW_SECTOR: finance
      MINIFW_SECRET_KEY: "demo-financial-key-change-in-prod!!"
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_financial/policy.json
      MINIFW_FEEDS: /opt/minifw_ai/config/feeds
      MINIFW_LOG: /opt/minifw_ai/logs/events.jsonl
      MINIFW_FLOW_RECORDS: /opt/minifw_ai/logs/flow_records.jsonl
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_MLP_MODEL: /opt/minifw_ai/models/mlp_model.pkl
      MINIFW_YARA_RULES: /opt/minifw_ai/yara_rules
      MINIFW_DNS_SOURCE: file
      AI_ENABLED: "1"
      MINIFW_DISABLE_FLOWS: "1"
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/minifw_ai/logs/audit.jsonl && pgrep -f 'python.*minifw_ai'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Web Dashboard ────────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: minifw-financial-web
    container_name: minifw_financial_web
    depends_on:
      engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - minifw_financial_logs:/opt/minifw_ai/logs
      - ../config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-web.sh"]
    environment:
      PRODUCT_MODE: minifw_financial
      MINIFW_SECRET_KEY: "demo-financial-key-change-in-prod!!"
      MINIFW_ADMIN_PASSWORD: "Finance1!"
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_LOG: /opt/minifw_ai/logs/events.jsonl
      MINIFW_SECTOR: finance
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_financial/policy.json
      MINIFW_EXTERNAL_PORT: "8445"
      PYTHONPATH: /opt/minifw_ai/app
      DEMO_MODE: attack_simulation
    ports:
      - "8445:8443"
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Demo Traffic Injector ────────────────────────────────────────────────────
  injector:
    build:
      context: demo-injector-financial/
    image: minifw-financial-injector
    container_name: minifw_financial_injector
    depends_on:
      engine:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    volumes:
      - minifw_financial_logs:/logs
    environment:
      DNS_LOG_PATH: /logs/dnsmasq.log
    restart: unless-stopped
