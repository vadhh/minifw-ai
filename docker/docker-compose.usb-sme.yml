name: minifw-establishment
# USB variant — uses pre-loaded images, no source build required.
# Start via: demo.sh (USB root) — do not run directly.

volumes:
  minifw_sme_logs:

services:

  engine:
    image: minifw-ai-demo/establishment:latest
    container_name: minifw_sme_engine
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - minifw_sme_logs:/opt/minifw_ai/logs
      - ../config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-engine.sh"]
    environment:
      PRODUCT_MODE: minifw_establishment
      MINIFW_SECTOR: establishment
      MINIFW_SECRET_KEY: "demo-sme-key-change-in-prod!!"
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_establishment/policy.json
      MINIFW_FEEDS: /opt/minifw_ai/config/feeds
      MINIFW_LOG: /opt/minifw_ai/logs/events.jsonl
      MINIFW_FLOW_RECORDS: /opt/minifw_ai/logs/flow_records.jsonl
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_MLP_MODEL: /opt/minifw_ai/models/mlp_model.pkl
      MINIFW_YARA_RULES: /opt/minifw_ai/yara_rules
      MINIFW_DNS_SOURCE: file
      AI_ENABLED: "1"
      MINIFW_DISABLE_FLOWS: "1"
    healthcheck:
      test: ["CMD", "test", "-f", "/opt/minifw_ai/logs/audit.jsonl"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  web:
    image: minifw-ai-demo/establishment:latest
    container_name: minifw_sme_web
    depends_on:
      engine:
        condition: service_healthy
    volumes:
      - minifw_sme_logs:/opt/minifw_ai/logs
      - ../config/modes:/opt/minifw_ai/config/modes:ro
    entrypoint: ["/bin/bash", "/opt/minifw_ai/docker/entrypoint-web.sh"]
    environment:
      PRODUCT_MODE: minifw_establishment
      MINIFW_SECRET_KEY: "demo-sme-key-change-in-prod!!"
      MINIFW_ADMIN_PASSWORD: "SME_Demo1!"
      MINIFW_AUDIT_LOG: /opt/minifw_ai/logs/audit.jsonl
      MINIFW_SECTOR: establishment
      MINIFW_POLICY: /opt/minifw_ai/config/modes/minifw_establishment/policy.json
      MINIFW_EXTERNAL_PORT: "8444"
      PYTHONPATH: /opt/minifw_ai/app
    ports:
      - "8444:8443"
    restart: unless-stopped

  injector:
    image: minifw-ai-demo/establishment-injector:latest
    container_name: minifw_sme_injector
    depends_on:
      engine:
        condition: service_healthy
    volumes:
      - minifw_sme_logs:/logs
    environment:
      DNS_LOG_PATH: /logs/dnsmasq.log
    restart: unless-stopped
