<head>
  <meta charset="utf-8" />
  <title>{% block title %}MiniFW-AI{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />

  <!-- Preconnect to CDNs used below — resolves DNS before the browser
       needs the stylesheets, cutting ~100–300 ms on cold loads. -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- Bootstrap Icons (icons are used throughout; load early) -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <!-- Source Sans 3 — font-display:swap so text renders immediately in
       the system font while the web font loads in the background. -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" />
  </noscript>

  <!-- OverlayScrollbars CSS -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css" />

  <!-- AdminLTE 4 -->
  <link rel="stylesheet"
    href="{{ url_for('static', path='adminLTE/dist/css/adminlte.css') }}" />

  <!-- MiniFW-AI custom styles -->
  <link rel="stylesheet"
    href="{{ url_for('static', path='css/minifw.css') }}" />

  {% block extra_css %}{% endblock %}

  <script>
    // Apply saved theme before paint to avoid flash.
    // Also injects font-display:swap so Source Sans 3 never blocks rendering.
    (function () {
      var t = localStorage.getItem('mf-theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', t);
      // Patch the fontsource stylesheet to use font-display:swap once loaded.
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('link[href*="source-sans"]').forEach(function (l) {
          if (l.sheet) {
            try {
              Array.from(l.sheet.cssRules || []).forEach(function (r) {
                if (r.style && r.style.fontDisplay !== undefined) {
                  r.style.fontDisplay = 'swap';
                }
              });
            } catch (e) { /* cross-origin sheets may block access */ }
          }
        });
      });
    })();
  </script>
</head>
