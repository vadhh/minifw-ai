<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MiniFW-AI{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', path='css/minifw.css') }}">
  <script>
    (function () {
      const t = localStorage.getItem('mf-theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', t);
    })();
  </script>
</head>
<body>
<div class="auth-page">

  <!-- Dark mode toggle -->
  <div style="position:fixed;top:16px;right:16px;z-index:9999;">
    <button id="darkModeToggle" title="Toggle dark mode">
      <i class="bi bi-moon-stars-fill" id="darkModeIcon"></i>
    </button>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <i class="bi {% block logo_icon %}bi-shield-lock{% endblock %}"></i>
    </div>
    <div class="auth-title">{% block auth_title %}MiniFW-AI{% endblock %}</div>
    <div class="auth-subtitle">{% block auth_subtitle %}{% endblock %}</div>

    {% block content %}{% endblock %}
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
  const root = document.documentElement;
  const btn  = document.getElementById('darkModeToggle');
  const icon = document.getElementById('darkModeIcon');
  function applyTheme(t) {
    root.setAttribute('data-bs-theme', t);
    localStorage.setItem('mf-theme', t);
    if (icon) icon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
  }
  applyTheme(localStorage.getItem('mf-theme') || 'light');
  if (btn) btn.addEventListener('click', function () {
    applyTheme(root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
  });
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
